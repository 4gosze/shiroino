<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Good Morning Aphiphi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&family=Dancing+Script:wght@600&display=swap');

        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .cursive {
            font-family: 'Dancing Script', cursive;
        }

        .glass {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
        }

        .floating {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .heart {
            position: absolute;
            color: #3b82f6;
            opacity: 0.6;
            pointer-events: none;
            z-index: 0;
            animation: rise 5s linear forwards;
        }

        @keyframes rise {
            from {
                transform: translateY(100vh) scale(0);
                opacity: 1;
            }
            to {
                transform: translateY(-10vh) scale(1.5);
                opacity: 0;
            }
        }

        .pulse-soft {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4 relative">

    <!-- Floating Background Elements -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none" id="heart-container"></div>

    <!-- Main Card -->
    <div class="glass p-8 rounded-3xl max-w-md w-full text-center z-10 floating">
        <div class="mb-6 flex justify-center">
            <div class="bg-blue-100 p-4 rounded-full pulse-soft">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-16 h-16 text-blue-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32l1.41 1.41M2 12h2m16 0h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41M12 7a5 5 0 1 0 0 10 5 5 0 0 0 0-10z"/>
                </svg>
            </div>
        </div>

        <h1 class="text-4xl font-bold text-blue-800 mb-2">Good Morning,</h1>
        <h2 class="text-5xl cursive text-blue-600 mb-6">Aphiphi</h2>

        <p id="morning-quote" class="text-blue-700 text-lg italic mb-8 h-20 flex items-center justify-center">
            "May your day be as bright as your smile this morning."
        </p>

        <button onclick="changeMessage()" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-8 rounded-full transition-all transform hover:scale-105 active:scale-95 shadow-lg">
            Click for Spark's ✨
        </button>
    </div>

    <!-- Footer Message -->
    <div class="mt-8 text-blue-600 text-sm opacity-70 z-10">
        Made with ❤️ for Shiroino
    </div>

    <script>
        const messages = [
            "Hope your day is as bright as your smile this morning. ☀️",
            "Don't forget to eat breakfast and stay energized, babe! 💪",
            "Just wanted to say, I love you more than yesterday. ❤️",
            "Good luck with your work today, Aphiphi! ✨",
            "Don't forget to drink plenty of water, beautiful! 💧",
            "Whatever happens today, remember I'm always here for you. 🏠"
        ];

        let lastIndex = -1;

        function changeMessage() {
            const quoteElement = document.getElementById('morning-quote');
            let randomIndex;
            
            // Ensure we don't get the same message twice in a row
            do {
                randomIndex = Math.floor(Math.random() * messages.length);
            } while (randomIndex === lastIndex);
            
            lastIndex = randomIndex;

            // Fade out effect
            quoteElement.style.opacity = 0;
            
            setTimeout(() => {
                quoteElement.innerText = `"${messages[randomIndex]}"`;
                quoteElement.style.opacity = 1;
                createHeart();
                createHeart();
                createHeart();
            }, 300);
        }

        function createHeart() {
            const container = document.getElementById('heart-container');
            const heart = document.createElement('div');
            heart.classList.add('heart');
            
            // Randomly choose between heart and sparkle
            const isHeart = Math.random() > 0.3;
            heart.innerHTML = isHeart ? `
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            ` : `
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 1L9 9l-8 3 8 3 3 8 3-8 8-3-8-3-3-8z"/></svg>
            `;

            const startX = Math.random() * 100;
            const size = Math.random() * 20 + 10;
            const duration = Math.random() * 3 + 2;

            heart.style.left = startX + 'vw';
            heart.style.fontSize = size + 'px';
            heart.style.animationDuration = duration + 's';
            heart.style.bottom = '-50px';

            container.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, duration * 1000);
        }

        // Periodically create hearts
        setInterval(createHeart, 2000);

        // Initial animation
        window.onload = () => {
            document.getElementById('morning-quote').style.transition = 'opacity 0.5s ease';
            for(let i=0; i<5; i++) {
                setTimeout(createHeart, i * 500);
            }
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Untuk Shiro ✨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&family=Dancing+Script:wght@600&display=swap');

        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #dbeafe 50%, #e0f2fe 100%);
            min-height: 100vh;
            scroll-behavior: smooth;
        }

        .cursive { font-family: 'Dancing Script', cursive; }

        .glass {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .floating { animation: float 6s ease-in-out infinite; }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            33% { transform: translateY(-15px) rotate(1deg); }
            66% { transform: translateY(-5px) rotate(-1deg); }
        }

        .heart {
            position: absolute;
            color: #60a5fa;
            pointer-events: none;
            z-index: 0;
            filter: drop-shadow(0 0 5px rgba(96, 165, 250, 0.3));
            animation: rise linear forwards;
        }

        @keyframes rise {
            0% { transform: translateY(110vh) translateX(0) scale(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; transform: translateY(90vh) translateX(10px) scale(1) rotate(10deg); }
            100% { transform: translateY(-20vh) translateX(-20px) scale(1.5) rotate(360deg); opacity: 0; }
        }

        .sparkle-mouse {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #60a5fa;
            border-radius: 50%;
            pointer-events: none;
            z-index: 999;
            opacity: 0;
            filter: blur(2px);
            animation: particle-fade 0.8s ease-out forwards;
        }

        @keyframes particle-fade {
            from { transform: scale(1); opacity: 0.6; }
            to { transform: scale(0.1); opacity: 0; }
        }

        .btn-ai {
            background: linear-gradient(to right, #1e3a8a, #1e40af);
            box-shadow: 0 10px 15px -3px rgba(30, 58, 138, 0.3);
        }

        #memory-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .modal-content {
            background: white;
            border-radius: 2.5rem;
            max-width: 500px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }

        .loader {
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid #ffffff;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .photo-square { grid-column: span 1; aspect-ratio: 1 / 1; }
        .photo-landscape { grid-column: span 2; aspect-ratio: 16 / 9; }
    </style>
</head>
<body class="relative">

    <div class="fixed inset-0 overflow-hidden pointer-events-none" id="background-layer"></div>

    <main class="min-h-screen flex items-center justify-center p-6 relative z-10">
        <div class="glass p-8 md:p-10 rounded-[2.5rem] max-w-md w-full text-center floating" id="main-card">
            
            <div class="mb-6 flex justify-center">
                <div class="relative">
                    <div class="bg-blue-50 p-6 rounded-full relative z-10">
                        <i data-lucide="sun" id="weather-icon" class="w-12 h-12 text-blue-500"></i>
                    </div>
                    <div class="absolute inset-0 bg-blue-400 rounded-full opacity-20 scale-125 animate-ping"></div>
                </div>
            </div>

            <div class="space-y-1 mb-4">
                <p class="text-blue-400 font-semibold tracking-widest uppercase text-xs">A special gift for you</p>
                <h1 id="greeting-text" class="text-3xl font-bold text-blue-800">Good Morning,</h1>
                <h2 class="text-5xl cursive text-blue-600">Shiroino</h2>
            </div>

            <div class="bg-white/30 rounded-2xl p-5 mb-6 min-h-[100px] flex items-center justify-center border border-white/40 shadow-sm transition-all duration-500">
                <p id="morning-quote" class="text-blue-800 text-lg leading-relaxed font-medium transition-opacity duration-300">
                    "May your day be as bright as your smile this morning."
                </p>
            </div>

            <div class="mb-6 text-left bg-slate-900 p-5 rounded-3xl border border-blue-800 shadow-xl">
                <label class="text-[10px] font-bold text-blue-400 uppercase tracking-widest ml-1 mb-2 block">Dream Alchemist ✨</label>
                <div class="relative">
                    <input id="dream-input" type="text" placeholder="Share your dream or mood..." 
                        class="w-full bg-slate-800 border border-blue-700 rounded-xl px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all placeholder:text-blue-300/30 text-blue-100">
                    <button onclick="interpretDream()" class="absolute right-2 top-1.5 text-blue-400 hover:text-blue-200 transition-colors">
                        <i data-lucide="sparkles" class="w-5 h-5"></i>
                    </button>
                </div>
                <div id="ai-response" class="hidden mt-3 p-3 bg-slate-800/50 rounded-xl text-xs text-blue-200 italic leading-relaxed border border-blue-700/50"></div>
            </div>

            <div class="flex flex-col space-y-3">
                <button onclick="window.location.href='happy-birthday.html'" class="bg-gradient-to-r from-blue-500 to-indigo-600 hover:opacity-90 text-white font-bold py-4 px-6 rounded-2xl transition-all transform hover:scale-105 active:scale-95 shadow-xl flex items-center justify-center space-x-2">
                    <i data-lucide="gift" class="w-5 h-5"></i>
                    <span>Happy Birthday Surprise! 🎂</span>
                </button>

                <div class="grid grid-cols-2 gap-3">
                    <button onclick="generateAdventure()" class="btn-ai text-white font-bold py-3 rounded-2xl transition-all transform hover:scale-105 text-sm">
                        Mini-Quest ✨
                    </button>
                    <button onclick="toggleModal()" class="bg-white border-2 border-blue-400 text-blue-500 font-bold py-3 rounded-2xl transition-all transform hover:scale-105 text-sm">
                        Memories
                    </button>
                </div>
            </div>
        </div>
    </main>

    <div id="memory-modal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="flex justify-between items-start mb-2">
                <div>
                    <h3 class="text-2xl font-bold text-blue-800">Our Memories ✨</h3>
                    <p class="text-blue-400 text-sm font-medium">Since Dec 20, 2025</p>
                </div>
                <button onclick="toggleModal()" class="text-gray-400 hover:text-blue-500 transition-colors p-2">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <div class="bg-blue-50 rounded-2xl p-4 mb-6 text-center shadow-sm">
                <div id="lifetime-timer" class="text-blue-800 font-bold text-xl tabular-nums">0d 0h 0m 0s</div>
            </div>
            <div class="grid grid-cols-2 gap-4" id="gallery-container"></div>
            <p class="mt-6 text-center text-blue-400 italic text-sm">"Every picture tells a story, especially ours."</p>
        </div>
    </div>

    <footer class="py-10 text-center text-blue-400 text-[10px] tracking-widest uppercase font-bold opacity-60">
        <p>With Love for Shiroino &bull; 2026</p>
    </footer>

    <script>
        // API KEY & CONFIG
        const apiKey = "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"; 
        const startDate = new Date('2025-12-20T00:00:00');
        const myPhotos = [
            { url: "https://i.imgur.com/udD7Nji.png", type: "square" }, 
            { url: "https://i.imgur.com/bBV9ZX4.png", type: "square" },
            { url: "https://i.imgur.com/3ZOiyZJ.png", type: "square" },
            { url: "https://i.imgur.com/HDocgJm.png", type: "square" },
            { url: "https://i.imgur.com/RstBcML.jpeg", type: "landscape" },
            { url: "https://i.imgur.com/s3qeweS.jpeg", type: "landscape" },
            { url: "https://i.imgur.com/wqvxjIR.png", type: "square" },
            { url: "https://i.imgur.com/TvAXmIB.png", type: "square" }
        ];

        // GREETING & TIMER
        function updateTimer() {
            const diff = new Date() - startDate;
            const days = Math.floor(diff / 86400000);
            const hours = Math.floor((diff % 86400000) / 3600000);
            const minutes = Math.floor((diff % 3600000) / 60000);
            const seconds = Math.floor((diff % 60000) / 1000);
            document.getElementById('lifetime-timer').innerHTML = `${days}d ${hours}h ${minutes}m ${seconds}s`;
        }

        function setGreeting() {
            const hour = new Date().getHours();
            let text = "Good Morning,";
            if (hour >= 12 && hour < 17) text = "Good Afternoon,";
            else if (hour >= 17 && hour < 20) text = "Good Evening,";
            else if (hour >= 20 || hour < 4) text = "Good Night,";
            document.getElementById('greeting-text').innerText = text;
        }

        // AI FUNCTIONS
        async function callFreeAI(prompt, systemInstruction) {
            if (!apiKey) return "API key missing...";
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${apiKey}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant",
                        messages: [{ role: "system", content: systemInstruction }, { role: "user", content: prompt }],
                        temperature: 0.9, max_tokens: 150
                    })
                });
                const data = await response.json();
                return data.choices[0]?.message?.content || "Magic is recharging...";
            } catch (error) { return "The stars are quiet..."; }
        }

        async function interpretDream() {
            const input = document.getElementById('dream-input');
            const responseDiv = document.getElementById('ai-response');
            if (!input.value.trim()) return;
            responseDiv.classList.remove('hidden');
            responseDiv.innerHTML = 'Brewing magic... <div class="loader"></div>';
            const result = await callFreeAI(`Shiro says: ${input.value}`, "You are a poetic Dream Alchemist. Give a 1-sentence sweet interpretation with emojis.");
            responseDiv.innerText = result.trim();
            input.value = "";
        }

        async function generateAdventure() {
            const quoteElement = document.getElementById('morning-quote');
            quoteElement.innerText = "Consulting the muse...";
            const result = await callFreeAI("Suggest 1 tiny creative doodle challenge.", "Suggest 1 sentence tiny drawing challenge with emojis.");
            quoteElement.innerText = `"${result.trim()}"`;
            for(let i=0; i<5; i++) createParticle();
        }

        // MODAL & PARTICLES
        function toggleModal() {
            const m = document.getElementById('memory-modal');
            m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
        }
        function closeModal(e) { if(e.target.id === 'memory-modal') toggleModal(); }

        function createParticle() {
            const p = document.createElement('div');
            p.classList.add('heart');
            p.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`;
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDuration = (4 + Math.random() * 4) + 's';
            document.getElementById('background-layer').appendChild(p);
            setTimeout(() => p.remove(), 8000);
        }

        document.addEventListener('mousemove', (e) => {
            if (Math.random() > 0.85) {
                const s = document.createElement('div');
                s.className = 'sparkle-mouse';
                s.style.left = e.clientX + 'px'; s.style.top = e.clientY + 'px';
                document.body.appendChild(s);
                setTimeout(() => s.remove(), 800);
            }
        });

        // INIT
        window.onload = () => {
            setGreeting();
            updateTimer();
            setInterval(updateTimer, 1000);
            setInterval(createParticle, 1500);
            lucide.createIcons();

            const gallery = document.getElementById('gallery-container');
            myPhotos.forEach(p => {
                const div = document.createElement('div');
                div.className = `${p.type === 'landscape' ? 'photo-landscape' : 'photo-square'} overflow-hidden rounded-xl bg-gray-100`;
                div.innerHTML = `<img src="${p.url}" class="w-full h-full object-cover hover:scale-105 transition-all duration-500" loading="lazy" onerror="this.src='https://picsum.photos/400/225'">`;
                gallery.appendChild(div);
            });
        };
    </script>
</body>
</html>
